name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build source distribution
        run: python -m build --sdist

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-dist-sdist
          path: dist/*.tar.gz

  build-wheel-macos:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-15-intel
          - macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build native backend
        run: swift build -c release --product schrosim-cli

      - name: Stage packaged backend
        run: |
          BIN_PATH="$(swift build -c release --show-bin-path)"
          install -m 755 "$BIN_PATH/schrosim-cli" src/schrosim/_bin/schrosim-cli

      - name: Build wheel
        run: python -m build --wheel

      - name: Validate wheel
        run: python -m twine check dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: python-dist-wheel-${{ matrix.runner }}
          path: dist/*.whl

  publish-testpypi:
    if: ${{ inputs.repository == 'testpypi' }}
    needs:
      - build-sdist
      - build-wheel-macos
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: python-dist-*
          path: dist/
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: ${{ inputs.repository == 'pypi' }}
    needs:
      - build-sdist
      - build-wheel-macos
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: python-dist-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
