name: Bug Report
description: Report a reproducible defect in public SchroSIM components (CLI/core/docs).
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For security vulnerabilities, use SECURITY.md and private reporting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the defect.
      placeholder: What is broken?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (schrosim-cli)
        - Swift core runtime
        - Rust core runtime
        - Configuration/examples
        - Documentation
        - Other public component
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command / Entry point
      description: Include command and backend (if applicable).
      placeholder: swift run schrosim-cli run examples/runtime_default_foundry.json --backend hybrid
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: List exact steps and input files/JSON needed.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: macOS version, Swift version, Rust version, and any relevant tooling versions.
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: This is not a security vulnerability disclosure.
          required: true
        - label: This report only references public repo scope (CLI/core/docs), not private enterprise GUI code.
          required: true
